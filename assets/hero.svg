<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" fill="none" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Jumin Cho — A Dreamer of an Artificial Intelligence Expert. AI Researcher, PhD student at Jeonbuk National University.">
  <title>Jumin Cho — A Dreamer of an Artificial Intelligence Expert</title>
  <defs>
    <!-- ===== Backdrop ===== -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04050d"/>
      <stop offset="0.5" stop-color="#0a0a1e"/>
      <stop offset="1" stop-color="#04050d"/>
    </linearGradient>

    <!-- ===== Moving name gradient (seamless loop via repeat) ===== -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.28" stop-color="#a855f7"/>
      <stop offset="0.55" stop-color="#f59e0b"/>
      <stop offset="0.78" stop-color="#fb4d12"/>
      <stop offset="1" stop-color="#6366f1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="420 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- ===== Aurora blobs ===== -->
    <radialGradient id="auroraA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="blob" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>

    <clipPath id="frame"><rect x="0" y="0" width="1200" height="360" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- backdrop -->
    <rect width="1200" height="360" fill="url(#bg)"/>

    <!-- drifting aurora -->
    <g filter="url(#blob)">
      <circle cx="250" cy="120" r="220" fill="url(#auroraA)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 80 40; -30 20; 0 0" dur="16s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;1;0.7;0.8" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="260" r="240" fill="url(#auroraB)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -70 -30; 30 -50; 0 0" dur="19s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.95;0.6;0.7" dur="11s" repeatCount="indefinite"/>
      </circle>
      <circle cx="640" cy="60" r="200" fill="url(#auroraC)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 40 60; -50 30; 0 0" dur="22s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.85;0.45;0.5" dur="13s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- perspective grid floor -->
    <g stroke="#6366f1" stroke-opacity="0.10" stroke-width="1">
      <path d="M0 360 L 420 250"/><path d="M150 360 L 480 250"/><path d="M300 360 L 540 250"/>
      <path d="M450 360 L 600 250"/><path d="M600 360 L 600 250"/><path d="M750 360 L 600 250"/>
      <path d="M900 360 L 660 250"/><path d="M1050 360 L 720 250"/><path d="M1200 360 L 780 250"/>
      <path d="M0 360 L 1200 360" stroke-opacity="0.18"/>
      <path d="M120 320 L 1080 320" stroke-opacity="0.10"/>
      <path d="M250 285 L 950 285" stroke-opacity="0.06"/>
    </g>

    <!-- twinkling particles -->
    <g fill="#cbd5ff">
      <circle cx="120" cy="70" r="1.6"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.1s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="90" r="1.4"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.9s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="48" r="1.8"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="200" cy="300" r="1.5"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4.3s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="1140" cy="220" r="1.3"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.4s" begin="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="200" r="1.6"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.0s" begin="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="40" r="1.3"><animate attributeName="opacity" values="0.1;0.85;0.1" dur="4.8s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="320" r="1.5"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.6s" begin="1.4s" repeatCount="indefinite"/></circle>
      <circle cx="410" cy="320" r="1.2"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="5.1s" begin="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="1010" cy="320" r="1.6"><animate attributeName="opacity" values="0.1;0.95;0.1" dur="2.9s" begin="0.2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- radiology-style scan trace (nods to the HIDDEN-RAD work) -->
    <path d="M60 250 H 360 l 14 -34 l 18 64 l 16 -120 l 18 150 l 16 -60 l 22 0 H 1140"
          stroke="#f59e0b" stroke-opacity="0.55" stroke-width="2" fill="none"
          stroke-linejoin="round" stroke-linecap="round"
          stroke-dasharray="1400" stroke-dashoffset="1400">
      <animate attributeName="stroke-dashoffset" values="1400;0" dur="4s" begin="0.4s" fill="freeze"/>
      <animate attributeName="stroke-opacity" values="0.55;0.25;0.55" dur="5s" begin="4.4s" repeatCount="indefinite"/>
    </path>

    <!-- sweeping scan line -->
    <rect x="0" y="0" width="2" height="360" fill="#a855f7" fill-opacity="0.5" filter="url(#soft)">
      <animate attributeName="x" values="-20;1220" dur="7s" begin="1s" repeatCount="indefinite"/>
    </rect>

    <!-- ===== HUD top row ===== -->
    <g font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#7c83b5">
      <text x="60" y="48" opacity="0">◢ JUMIN.CHO<animate attributeName="opacity" values="0;0.9" dur="0.6s" begin="0.2s" fill="freeze"/></text>
      <text x="1140" y="48" text-anchor="end" opacity="0">35.82°N · 127.10°E — JEONJU, KR<animate attributeName="opacity" values="0;0.7" dur="0.6s" begin="0.4s" fill="freeze"/></text>
    </g>
    <line x1="60" y1="62" x2="1140" y2="62" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- ===== Name ===== -->
    <g filter="url(#soft)" opacity="0.9">
      <text x="60" y="200" font-size="104" font-weight="800" letter-spacing="-2" fill="url(#nameGrad)">JUMIN CHO</text>
    </g>
    <text x="60" y="200" font-size="104" font-weight="800" letter-spacing="-2" fill="url(#nameGrad)">JUMIN CHO
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="6s" repeatCount="indefinite"/>
    </text>

    <!-- ===== Subtitle (serif, editorial) ===== -->
    <text x="63" y="248" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="27" fill="#e7e9ff" opacity="0">
      “A Dreamer of an Artificial Intelligence Expert”
      <animate attributeName="opacity" values="0;0.96" dur="0.9s" begin="0.7s" fill="freeze"/>
    </text>

    <!-- ===== Mono tagline ===== -->
    <text x="64" y="292" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="13" letter-spacing="3.5" fill="#9aa0d6" opacity="0">
      AI RESEARCHER&#160;&#160;//&#160;&#160;PhD STUDENT @ JEONBUK NATIONAL UNIVERSITY
      <animate attributeName="opacity" values="0;0.85" dur="0.9s" begin="1.05s" fill="freeze"/>
    </text>

    <!-- blinking caret -->
    <rect x="64" y="305" width="11" height="2" fill="#f59e0b" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;1;0;1" keyTimes="0;0.18;0.3;0.45;0.6;0.75;1" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </rect>

    <!-- corner ticks -->
    <g stroke="#f59e0b" stroke-opacity="0.6" stroke-width="2">
      <path d="M24 24 h22 M24 24 v22"/>
      <path d="M1176 24 h-22 M1176 24 v22"/>
      <path d="M24 336 h22 M24 336 v-22"/>
      <path d="M1176 336 h-22 M1176 336 v-22"/>
    </g>
  </g>
</svg>
